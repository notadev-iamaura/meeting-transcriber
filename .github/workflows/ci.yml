# CI 파이프라인 — 푸시 및 PR 시 자동 실행
#
# 목적: 코드 품질(린트) + 테스트 자동 검증
# 린트: ubuntu (빠름) — ruff check + ruff format --check
# 테스트: macOS (실제 타깃 플랫폼) — pytest 전체 실행
#
# 참고: macOS 전용 앱이므로 테스트는 macos runner에서 실행한다.
#       public repo에서 macOS runner는 무료.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: 린트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ruff 설치
        run: pip install ruff

      - name: 린트 검사
        run: ruff check .

      - name: 포맷 검사
        run: ruff format --check .

  test:
    name: 테스트 (Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: ffmpeg 설치
        run: brew install ffmpeg

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 단위 테스트 실행
        run: pytest tests/ -v --tb=short -x --ignore=tests/test_main.py

  swift-build:
    name: Swift 컴파일 검증 (Aggregate Device)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: swiftc 버전
        run: swift --version

      - name: Aggregate Device 생성 스크립트 빌드
        # 실제 실행은 하지 않는다 — CoreAudio 장치 생성은 GitHub runner 에
        # BlackHole 이 없어 의미가 없으므로 컴파일 성공 여부만 검증.
        # xcode-select 경로는 runner 기본값(/Applications/Xcode.app) 사용.
        run: |
          swiftc scripts/create_aggregate_device.swift -o /tmp/create_aggregate
          file /tmp/create_aggregate
          /tmp/create_aggregate || echo "실행은 건너뜀 (BlackHole 없음 정상)"
