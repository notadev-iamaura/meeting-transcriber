# CI 파이프라인 — 푸시 및 PR 시 자동 실행
#
# 목적: 코드 품질(린트) + 테스트 자동 검증
# 린트: ubuntu (빠름) — ruff check + ruff format --check
# 테스트: macOS (실제 타깃 플랫폼) — pytest 전체 실행
#
# 참고: macOS 전용 앱이므로 테스트는 macos runner에서 실행한다.
#       public repo에서 macOS runner는 무료.

name: CI

# 트리거 — 코드/설정/CI 파일 변경에만 반응한다.
# `paths-ignore` 에 매칭되는 파일만 변경된 푸시·PR (예: README/문서/이미지) 은
# CI 가 아예 실행되지 않아 macOS 러너 5 분 + 이중 매트릭스 비용을 절약한다.
# branch protection 의 "Required" 체크는 이 워크플로의 잡 이름(린트, 테스트,
# Swift 컴파일 검증)을 참조하지 않도록 설정되어 있어야 한다 — 만약 required
# 로 묶여 있으면 PR 이 영원히 pending 상태로 막힌다 (GitHub 알려진 한계).
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'

permissions:
  contents: read

jobs:
  lint:
    name: 린트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ruff 설치
        run: pip install ruff

      - name: 린트 검사
        run: ruff check .

      - name: 포맷 검사
        run: ruff format --check .

  test:
    name: 테스트 (Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: ffmpeg 설치
        run: brew install ffmpeg

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Playwright 브라우저 설치
        # tests/ui/ 의 a11y/behavior/visual 테스트가 chromium 헤드리스
        # 셸을 요구한다. 이 단계 누락 시 첫 Playwright 테스트가
        # `BrowserType.launch: Executable doesn't exist` 로 전체 잡 실패.
        # `pyproject.toml` 의 `addopts = "-m 'not e2e'"` 로 무거운 e2e 마커는
        # 기본 실행에서 제외되므로, 여기서는 chromium 헤드리스 셸만 설치하면 충분.
        run: playwright install chromium

      - name: 단위 테스트 실행
        run: pytest tests/ -v --tb=short -x --ignore=tests/test_main.py

  swift-build:
    name: Swift 컴파일 검증 (Aggregate Device)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: swiftc 버전
        run: swift --version

      - name: Aggregate Device 생성 스크립트 빌드
        # 실제 실행은 하지 않는다 — CoreAudio 장치 생성은 GitHub runner 에
        # BlackHole 이 없어 의미가 없으므로 컴파일 성공 여부만 검증.
        # xcode-select 경로는 runner 기본값(/Applications/Xcode.app) 사용.
        run: |
          swiftc scripts/create_aggregate_device.swift -o /tmp/create_aggregate
          file /tmp/create_aggregate
          /tmp/create_aggregate || echo "실행은 건너뜀 (BlackHole 없음 정상)"
