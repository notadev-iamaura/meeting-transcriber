<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전사문 뷰어 — 회의 전사 시스템</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- 뷰어 페이지 max-width 오버라이드 -->
    <style>:root { --max-width: 1000px; }</style>
</head>
<body>
    <!-- === 헤더 === -->
    <header class="header">
        <div class="header-inner">
            <div class="header-title">
                <span class="header-title-icon">&#x1F399;</span>
                <span>회의 전사 시스템</span>
            </div>
            <nav class="header-nav">
                <a href="/static/index.html" class="nav-link">회의 목록</a>
                <a href="/static/chat.html" class="nav-link">AI Chat</a>
            </nav>
        </div>
    </header>

    <!-- === 메인 컨텐츠 === -->
    <main class="container">
        <!-- 뒤로가기 -->
        <a href="/static/index.html" class="back-link">
            <span>&#x2190;</span> 회의 목록으로 돌아가기
        </a>

        <!-- 에러 배너 (접근성: role="alert") -->
        <div class="error-banner" id="errorBanner" role="alert" aria-live="assertive">
            <span aria-hidden="true">&#x26A0;</span>
            <span id="errorMessage"></span>
            <button class="error-banner-close" id="errorClose" aria-label="에러 알림 닫기">&#x2715;</button>
        </div>

        <!-- 회의 정보 -->
        <div class="meeting-info" id="meetingInfo" style="display:none;">
            <div class="meeting-info-header">
                <span class="meeting-info-title" id="meetingTitle"></span>
                <span class="meeting-info-status" id="meetingStatus"></span>
            </div>
            <div class="meeting-meta-row">
                <span class="meeting-meta-item" id="metaFile"></span>
                <span class="meeting-meta-item" id="metaDate"></span>
                <span class="meeting-meta-item" id="metaSpeakers"></span>
                <span class="meeting-meta-item" id="metaUtterances"></span>
            </div>
            <div class="speaker-legend" id="speakerLegend"></div>
        </div>

        <!-- 탭 네비게이션 (접근성: ARIA 탭 패턴 적용) -->
        <div class="tabs" id="tabNav" style="display:none;" role="tablist" aria-label="회의 내용 탭">
            <button class="tab-btn active" data-tab="transcript"
                    role="tab" id="tabTranscript"
                    aria-selected="true"
                    aria-controls="panelTranscript">전사문</button>
            <button class="tab-btn" data-tab="summary"
                    role="tab" id="tabSummary"
                    aria-selected="false"
                    aria-controls="panelSummary">회의록 (AI 요약)</button>
        </div>

        <!-- 전사문 탭 (접근성: role="tabpanel") -->
        <div class="tab-panel active" id="panelTranscript"
             role="tabpanel" aria-labelledby="tabTranscript">
            <!-- 인라인 검색 (Ctrl+F 연동, 이전/다음 네비게이션) -->
            <div class="search-bar" id="searchBar" style="display:none;">
                <input
                    type="text"
                    class="search-bar-input"
                    id="searchInput"
                    placeholder="전사문 내 검색... (Ctrl+F)"
                    autocomplete="off"
                    aria-label="전사문 내 검색"
                />
                <span class="search-bar-info" id="searchInfo" role="status" aria-live="polite"></span>
                <button class="search-bar-clear" id="searchPrev" aria-label="이전 결과" style="display:none;">&#x25B2;</button>
                <button class="search-bar-clear" id="searchNext" aria-label="다음 결과" style="display:none;">&#x25BC;</button>
                <button class="search-bar-clear" id="searchClear">초기화</button>
            </div>

            <div class="timeline" id="timeline"></div>

            <div class="loading-overlay" id="transcriptLoading" role="status" aria-live="polite">
                <span class="loading-spinner" aria-hidden="true"></span>
                <span>전사문 불러오는 중...</span>
            </div>

            <div class="empty-state" id="transcriptEmpty" style="display:none;">
                <div class="empty-state-icon">&#x1F4DD;</div>
                <div class="empty-state-text">전사문이 아직 생성되지 않았습니다</div>
                <div class="empty-state-sub">
                    파이프라인이 처리 중이라면 잠시 기다려 주세요.<br>
                    완료되면 전사문이 자동으로 표시됩니다.
                </div>
            </div>
        </div>

        <!-- 회의록 탭 (접근성: role="tabpanel") -->
        <div class="tab-panel" id="panelSummary"
             role="tabpanel" aria-labelledby="tabSummary">
            <div class="summary-content" id="summaryContent"></div>

            <div class="loading-overlay" id="summaryLoading" role="status" aria-live="polite">
                <span class="loading-spinner" aria-hidden="true"></span>
                <span>회의록 불러오는 중...</span>
            </div>

            <div class="empty-state" id="summaryEmpty" style="display:none;">
                <div class="empty-state-icon">&#x1F4CB;</div>
                <div class="empty-state-text">회의록이 아직 생성되지 않았습니다</div>
                <div class="empty-state-sub">
                    AI 요약 단계까지 파이프라인이 진행되면<br>
                    자동으로 회의록이 생성됩니다.
                </div>
            </div>
        </div>
    </main>

    <!-- 공통 모듈 -->
    <script src="/static/app.js"></script>

    <script>
    /* === 전사문 뷰어 스크립트 ===
     *
     * 목적: 특정 회의의 전사문(화자별 타임라인)과 회의록(AI 요약)을 표시한다.
     * 의존성: MeetingApp (app.js), /api/meetings/{id}, /api/meetings/{id}/transcript,
     *         /api/meetings/{id}/summary API 엔드포인트
     */
    (function () {
        "use strict";

        // === MeetingApp 참조 ===
        var App = window.MeetingApp;

        // === URL 파라미터에서 meeting_id 추출 ===
        var params = new URLSearchParams(window.location.search);
        var meetingId = params.get("meeting_id");
        var initialQuery = params.get("q") || ""; // 외부에서 전달된 검색어
        var initialTimestamp = parseFloat(params.get("t") || ""); // 외부에서 전달된 타임스탬프 (초)

        if (!meetingId) {
            window.location.href = "/static/index.html";
            return;
        }

        // === DOM 참조 ===
        var elements = {
            meetingInfo: document.getElementById("meetingInfo"),
            meetingTitle: document.getElementById("meetingTitle"),
            meetingStatus: document.getElementById("meetingStatus"),
            metaFile: document.getElementById("metaFile"),
            metaDate: document.getElementById("metaDate"),
            metaSpeakers: document.getElementById("metaSpeakers"),
            metaUtterances: document.getElementById("metaUtterances"),
            speakerLegend: document.getElementById("speakerLegend"),
            tabNav: document.getElementById("tabNav"),
            timeline: document.getElementById("timeline"),
            transcriptLoading: document.getElementById("transcriptLoading"),
            transcriptEmpty: document.getElementById("transcriptEmpty"),
            summaryContent: document.getElementById("summaryContent"),
            summaryLoading: document.getElementById("summaryLoading"),
            summaryEmpty: document.getElementById("summaryEmpty"),
            searchBar: document.getElementById("searchBar"),
            searchInput: document.getElementById("searchInput"),
            searchInfo: document.getElementById("searchInfo"),
            searchClear: document.getElementById("searchClear"),
            searchPrev: document.getElementById("searchPrev"),
            searchNext: document.getElementById("searchNext"),
        };

        // === 에러 배너 초기화 (자동 숨김 타이머 포함) ===
        var errorBanner = App.initErrorBanner("errorBanner", "errorMessage", "errorClose");
        var _viewerOrigShow = errorBanner.show;
        var _viewerAutoHideTimer = null;
        var VIEWER_AUTO_HIDE_DELAY = 8000; // 8초 후 자동 숨김
        errorBanner.show = function (text) {
            if (_viewerAutoHideTimer) { clearTimeout(_viewerAutoHideTimer); _viewerAutoHideTimer = null; }
            _viewerOrigShow(text);
            _viewerAutoHideTimer = setTimeout(function () {
                errorBanner.hide();
                _viewerAutoHideTimer = null;
            }, VIEWER_AUTO_HIDE_DELAY);
        };

        // === 상태 ===
        var speakerColorMap = {}; // 화자 → 색상 매핑
        var allUtterances = []; // 전사문 발화 데이터 보관
        var currentQuery = ""; // 현재 검색어
        var currentMatchIndex = -1; // 현재 하이라이트 인덱스 (검색 결과 네비게이션)
        var totalMatches = 0; // 전체 검색 결과 수

        // === 화자 색상 매핑 ===

        /** 화자 목록으로 색상 맵 생성 */
        function buildSpeakerColorMap(speakers) {
            speakerColorMap = {};
            speakers.forEach(function (s, i) {
                speakerColorMap[s] = App.SPEAKER_COLORS[i % App.SPEAKER_COLORS.length];
            });
        }

        /** 화자 색상 반환 */
        function getSpeakerColor(speaker) {
            return speakerColorMap[speaker] || "var(--text-secondary)";
        }

        // === 화자 범례 렌더링 ===
        function renderSpeakerLegend(speakers) {
            elements.speakerLegend.innerHTML = "";
            if (!speakers || speakers.length === 0) return;

            speakers.forEach(function (speaker) {
                var chip = document.createElement("span");
                chip.className = "speaker-chip";

                var dot = document.createElement("span");
                dot.className = "speaker-dot";
                dot.style.backgroundColor = getSpeakerColor(speaker);

                var label = document.createElement("span");
                label.textContent = speaker;

                chip.appendChild(dot);
                chip.appendChild(label);
                elements.speakerLegend.appendChild(chip);
            });
        }

        // === 전사문 렌더링 ===

        /**
         * 전사문 발화 목록을 타임라인으로 렌더링한다.
         * @param {Array} utterances - 발화 목록
         * @param {string} query - 검색어 (하이라이팅용)
         */
        function renderTimeline(utterances, query) {
            elements.timeline.innerHTML = "";
            var matchCount = 0;

            utterances.forEach(function (u) {
                var el = document.createElement("div");
                el.className = "utterance";
                var color = getSpeakerColor(u.speaker);
                el.style.borderLeftColor = color;

                // 시간
                var timeEl = document.createElement("span");
                timeEl.className = "utterance-time";
                timeEl.textContent = App.formatTime(u.start);

                // 화자
                var speakerEl = document.createElement("span");
                speakerEl.className = "utterance-speaker";
                speakerEl.textContent = u.speaker;
                speakerEl.style.color = color;

                // 텍스트 (검색어 하이라이팅 적용)
                var textEl = document.createElement("span");
                textEl.className = "utterance-text";

                if (query) {
                    var htmlContent = App.highlightText(u.text, query);
                    textEl.innerHTML = htmlContent;

                    // 매칭 여부 확인
                    if (u.text.toLowerCase().indexOf(query.toLowerCase()) >= 0) {
                        el.classList.add("highlighted");
                        matchCount++;
                    }
                } else {
                    textEl.textContent = u.text;
                }

                el.appendChild(timeEl);
                el.appendChild(speakerEl);
                el.appendChild(textEl);
                elements.timeline.appendChild(el);
            });

            // 검색 정보 업데이트 (카운트 및 네비게이션 버튼)
            totalMatches = matchCount;
            if (query) {
                if (matchCount > 0) {
                    currentMatchIndex = 0;
                    App.safeText(elements.searchInfo,
                        "1 / " + matchCount + "건 일치");
                    // 이전/다음 버튼 표시
                    elements.searchPrev.style.display = "inline-block";
                    elements.searchNext.style.display = "inline-block";
                } else {
                    currentMatchIndex = -1;
                    App.safeText(elements.searchInfo, "결과 없음");
                    elements.searchPrev.style.display = "none";
                    elements.searchNext.style.display = "none";
                }

                // 첫 번째 하이라이트로 스크롤
                var firstHighlight = elements.timeline.querySelector(".highlighted");
                if (firstHighlight) {
                    firstHighlight.scrollIntoView({ behavior: "smooth", block: "center" });
                }
            } else {
                currentMatchIndex = -1;
                totalMatches = 0;
                App.safeText(elements.searchInfo, "");
                elements.searchPrev.style.display = "none";
                elements.searchNext.style.display = "none";
            }
        }

        // === 타임스탬프 기반 스크롤 ===

        /**
         * 지정 타임스탬프에 가장 가까운 발화로 스크롤한다.
         * @param {number} targetTime - 타겟 시간 (초)
         */
        function scrollToTimestamp(targetTime) {
            var utteranceEls = elements.timeline.querySelectorAll(".utterance");
            var closestEl = null;
            var closestDiff = Infinity;

            allUtterances.forEach(function (u, idx) {
                var diff = Math.abs((u.start || 0) - targetTime);
                if (diff < closestDiff) {
                    closestDiff = diff;
                    closestEl = utteranceEls[idx] || null;
                }
            });

            if (closestEl) {
                closestEl.classList.add("highlighted");
                closestEl.scrollIntoView({ behavior: "smooth", block: "center" });
            }
        }

        // === 탭 전환 ===

        document.querySelectorAll(".tab-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
                // ARIA 탭 패턴: 모든 탭 비활성화
                document.querySelectorAll(".tab-btn").forEach(function (b) {
                    b.classList.remove("active");
                    b.setAttribute("aria-selected", "false");
                });
                // 현재 탭 활성화
                btn.classList.add("active");
                btn.setAttribute("aria-selected", "true");

                // 모든 패널 비활성화
                document.querySelectorAll(".tab-panel").forEach(function (panel) {
                    panel.classList.remove("active");
                });

                // 해당 패널만 활성화
                var tabName = btn.getAttribute("data-tab");
                if (tabName === "transcript") {
                    document.getElementById("panelTranscript").classList.add("active");
                } else if (tabName === "summary") {
                    document.getElementById("panelSummary").classList.add("active");
                }
            });

            // 키보드 탐색: 좌우 화살표로 탭 이동 (ARIA 탭 패턴)
            btn.addEventListener("keydown", function (e) {
                var tabs = Array.from(document.querySelectorAll(".tab-btn"));
                var idx = tabs.indexOf(btn);
                var nextIdx = -1;

                if (e.key === "ArrowRight") {
                    nextIdx = (idx + 1) % tabs.length;
                } else if (e.key === "ArrowLeft") {
                    nextIdx = (idx - 1 + tabs.length) % tabs.length;
                }

                if (nextIdx >= 0) {
                    e.preventDefault();
                    tabs[nextIdx].focus();
                    tabs[nextIdx].click();
                }
            });
        });

        // === 인라인 검색 ===

        var searchTimeout = null;

        elements.searchInput.addEventListener("input", function () {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function () {
                currentQuery = elements.searchInput.value.trim();
                renderTimeline(allUtterances, currentQuery);
            }, 300); // 300ms 디바운스
        });

        elements.searchClear.addEventListener("click", function () {
            elements.searchInput.value = "";
            currentQuery = "";
            renderTimeline(allUtterances, "");
        });

        /** 검색 결과 이전/다음 항목으로 스크롤하는 함수 */
        function navigateSearchResult(direction) {
            var highlights = elements.timeline.querySelectorAll(".highlighted");
            if (highlights.length === 0) return;

            currentMatchIndex += direction;
            if (currentMatchIndex < 0) currentMatchIndex = highlights.length - 1;
            if (currentMatchIndex >= highlights.length) currentMatchIndex = 0;

            highlights[currentMatchIndex].scrollIntoView({ behavior: "smooth", block: "center" });
            App.safeText(elements.searchInfo,
                (currentMatchIndex + 1) + " / " + highlights.length + "건 일치");
        }

        elements.searchPrev.addEventListener("click", function () {
            navigateSearchResult(-1);
        });

        elements.searchNext.addEventListener("click", function () {
            navigateSearchResult(1);
        });

        // Ctrl+F (Mac: Cmd+F) 키보드 단축키 → 인라인 검색창에 포커스
        document.addEventListener("keydown", function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === "f") {
                // 검색바가 표시된 상태에서만 동작
                if (elements.searchBar.style.display !== "none") {
                    e.preventDefault(); // 브라우저 기본 검색 방지
                    elements.searchInput.focus();
                    elements.searchInput.select();
                }
            }
            // ESC 키로 검색 초기화
            if (e.key === "Escape" && document.activeElement === elements.searchInput) {
                elements.searchInput.value = "";
                currentQuery = "";
                renderTimeline(allUtterances, "");
                elements.searchInput.blur();
            }
        });

        // === 데이터 로드 ===

        /** 회의 메타 정보 로드 */
        async function loadMeetingInfo() {
            try {
                var data = await App.apiRequest("/meetings/" + encodeURIComponent(meetingId));

                elements.meetingInfo.style.display = "block";
                App.safeText(elements.meetingTitle, data.meeting_id);

                // 상태 배지
                elements.meetingStatus.className = "meeting-info-status " + data.status;
                App.safeText(elements.meetingStatus, App.getStatusLabel(data.status));

                // 메타 정보
                App.safeText(elements.metaFile, "\uD83C\uDFA4 " + App.getFileName(data.audio_path));
                App.safeText(elements.metaDate, "\uD83D\uDCC5 " + App.formatDate(data.created_at));
            } catch (e) {
                if (e.status === 404) {
                    errorBanner.show("회의를 찾을 수 없습니다: " + meetingId);
                } else {
                    errorBanner.show("회의 정보 로드 실패: " + e.message);
                }
            }
        }

        /** 전사문 로드 */
        async function loadTranscript() {
            elements.transcriptLoading.classList.add("visible");
            elements.transcriptEmpty.style.display = "none";

            try {
                var data = await App.apiRequest(
                    "/meetings/" + encodeURIComponent(meetingId) + "/transcript"
                );

                allUtterances = data.utterances || [];

                if (allUtterances.length === 0) {
                    elements.transcriptEmpty.style.display = "block";
                    return;
                }

                // 화자 색상 맵 + 범례
                buildSpeakerColorMap(data.speakers || []);
                renderSpeakerLegend(data.speakers || []);

                // 메타 정보 업데이트
                App.safeText(elements.metaSpeakers,
                    "\uD83D\uDC64 화자 " + (data.num_speakers || 0) + "명");
                App.safeText(elements.metaUtterances,
                    "\uD83D\uDCDD 발화 " + (data.total_utterances || 0) + "건");

                // 탭과 검색바 표시
                elements.tabNav.style.display = "flex";
                elements.searchBar.style.display = "flex";

                // 초기 검색어 적용 (URL에서 전달된 경우)
                if (initialQuery) {
                    elements.searchInput.value = initialQuery;
                    currentQuery = initialQuery;
                }

                // 타임라인 렌더링
                renderTimeline(allUtterances, currentQuery);

                // URL 타임스탬프 파라미터로 해당 발화 위치로 스크롤
                if (!isNaN(initialTimestamp) && initialTimestamp >= 0) {
                    scrollToTimestamp(initialTimestamp);
                }

            } catch (e) {
                if (e.status === 404) {
                    elements.transcriptEmpty.style.display = "block";
                } else {
                    errorBanner.show("전사문 로드 실패: " + e.message);
                }
            } finally {
                elements.transcriptLoading.classList.remove("visible");
            }
        }

        /** 회의록 로드 */
        async function loadSummary() {
            elements.summaryLoading.classList.add("visible");
            elements.summaryEmpty.style.display = "none";

            try {
                var data = await App.apiRequest(
                    "/meetings/" + encodeURIComponent(meetingId) + "/summary"
                );

                if (!data.markdown) {
                    elements.summaryEmpty.style.display = "block";
                    return;
                }

                // 마크다운 렌더링
                elements.summaryContent.innerHTML = App.renderMarkdown(data.markdown);

                // 탭 표시 (전사문이 없더라도 회의록이 있으면 탭 표시)
                elements.tabNav.style.display = "flex";

            } catch (e) {
                if (e.status === 404) {
                    elements.summaryEmpty.style.display = "block";
                } else {
                    // 회의록 로드 실패는 경고 수준 (전사문이 메인)
                    console.warn("회의록 로드 실패:", e.message);
                    elements.summaryEmpty.style.display = "block";
                }
            } finally {
                elements.summaryLoading.classList.remove("visible");
            }
        }

        // === WebSocket 이벤트 리스닝 ===

        // 파이프라인 완료 시 데이터 자동 갱신
        document.addEventListener("ws:job_completed", function () {
            loadMeetingInfo();
            loadTranscript();
            loadSummary();
        });

        document.addEventListener("ws:pipeline_status", function () {
            loadMeetingInfo();
        });

        // === 초기화 ===

        // 페이지 타이틀 업데이트
        document.title = meetingId + " — 전사문 뷰어";

        // WebSocket 연결
        App.connectWebSocket();

        // 데이터 병렬 로드
        loadMeetingInfo();
        loadTranscript();
        loadSummary();
    })();
    </script>
</body>
</html>
