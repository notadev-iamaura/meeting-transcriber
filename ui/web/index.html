<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회의 전사 시스템</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- 사이드바: 항상 보이는 회의 목록 -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">회의 목록</h1>
                <input type="search" id="sidebar-search" class="sidebar-search" placeholder="검색...">
            </div>
            <div class="sidebar-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">연결 확인 중...</span>
            </div>
            <ul id="meeting-list" class="meeting-list"></ul>
        </aside>

        <!-- 메인 콘텐츠 영역 -->
        <main id="content">
            <!-- spa.js가 동적으로 렌더링 -->
        </main>
    </div>

    <!-- 에러 배너 -->
    <div class="error-banner" id="errorBanner" role="alert" aria-live="assertive">
        <span aria-hidden="true">&#x26A0;</span>
        <span id="errorMessage"></span>
        <button class="error-banner-close" id="errorClose" aria-label="에러 알림 닫기">&#x2715;</button>
    </div>

    <!-- 녹음 상태 플로팅 바 -->
    <div id="recordingStatus" class="recording-status">
        <span class="recording-dot"></span>
        <span class="recording-text">녹음 중</span>
        <span class="recording-duration" id="recordingDuration">00:00</span>
    </div>

    <script src="/static/app.js"></script>
    <script src="/static/spa.js"></script>
</body>
</html>
