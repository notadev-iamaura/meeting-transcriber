<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recap — 회의록</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- 1. 네비게이션 바 (56px, 좌측 고정) -->
    <nav id="nav-bar" aria-label="주요 내비게이션">
      <div class="nav-top">
        <!-- 회의 목록 버튼 -->
        <button class="nav-btn active" data-route="/app" id="navHome" aria-label="회의 목록">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="2" width="14" height="16" rx="2" />
            <line x1="7" y1="6" x2="13" y2="6" />
            <line x1="7" y1="10" x2="13" y2="10" />
            <line x1="7" y1="14" x2="10" y2="14" />
          </svg>
          <span class="nav-label">회의록</span>
          <kbd class="nav-kbd" aria-hidden="true">⌘1</kbd>
        </button>
        <!-- 검색 버튼 -->
        <button class="nav-btn" data-route="/app/search" id="navSearch" aria-label="검색">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8.5" cy="8.5" r="5.5" />
            <line x1="12.5" y1="12.5" x2="17" y2="17" />
          </svg>
          <span class="nav-label">검색</span>
          <kbd class="nav-kbd" aria-hidden="true">⌘K</kbd>
        </button>
        <!-- 채팅 버튼 -->
        <button class="nav-btn" data-route="/app/chat" id="navChat" aria-label="채팅">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h12a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H8l-4 3v-3a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
          </svg>
          <span class="nav-label">채팅</span>
        </button>
        <!-- 설정 버튼 -->
        <button class="nav-btn" data-route="/app/settings" id="navSettings" aria-label="설정">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="2.5" />
            <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.93 3.93l1.41 1.41M14.66 14.66l1.41 1.41M3.93 16.07l1.41-1.41M14.66 5.34l1.41-1.41" />
          </svg>
          <span class="nav-label">설정</span>
          <kbd class="nav-kbd" aria-hidden="true">⌘,</kbd>
        </button>
      </div>
      <div class="nav-bottom">
        <!-- 시스템 상태 인디케이터 -->
        <div class="nav-status" id="navStatus" role="status" aria-live="polite">
          <span class="status-dot" id="statusDot" aria-hidden="true"></span>
          <span class="nav-status-text" id="statusText"></span>
        </div>
      </div>
    </nav>

    <!-- 2. 리스트 패널 (280px, 회의 목록) -->
    <aside id="list-panel" aria-label="회의 목록 패널">
      <div class="list-header">
        <div class="brand-lockup">
          <img class="brand-mark brand-mark-light" src="/static/brand/app-icon-light.svg" width="20" height="20" alt="" aria-hidden="true">
          <img class="brand-mark brand-mark-dark" src="/static/brand/app-icon-dark.svg" width="20" height="20" alt="" aria-hidden="true">
          <h1 class="list-title">Recap</h1>
        </div>
        <span class="list-count" id="listCount"></span>
      </div>
      <div class="list-section-label">회의록</div>
      <div class="list-search">
        <input type="search" id="listSearchInput" placeholder="회의 검색..." aria-label="회의 검색">
      </div>
      <div class="list-sort">
        <select id="listSortSelect" aria-label="정렬">
          <option value="newest">최신순</option>
          <option value="oldest">오래된순</option>
          <option value="status">상태별</option>
        </select>
      </div>
      <div class="list-content" id="listContent" role="listbox" aria-label="회의 목록">
        <!-- spa.js가 회의 목록 렌더링 -->
      </div>
    </aside>

    <!-- 3. 콘텐츠 영역 (나머지 공간 flex:1) -->
    <main id="content">
      <!-- spa.js가 동적으로 렌더링 -->
    </main>
  </div>

  <!-- 테마 토글 (우측 상단 고정) -->
  <button class="theme-toggle" id="themeToggle" aria-label="다크/라이트 모드 전환">
    <svg class="theme-icon theme-icon-light" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="9" r="4"/>
      <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.93 3.93l1.41 1.41M12.66 12.66l1.41 1.41M3.93 14.07l1.41-1.41M12.66 5.34l1.41-1.41"/>
    </svg>
    <svg class="theme-icon theme-icon-dark" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15.36 10.36A7 7 0 1 1 7.64 2.64 5.5 5.5 0 0 0 15.36 10.36Z"/>
    </svg>
  </button>

  <!-- 에러 배너 (토스트) -->
  <div class="toast" id="errorBanner" role="alert" aria-live="assertive">
    <span class="toast-icon" aria-hidden="true">&#x26A0;</span>
    <span class="toast-message" id="errorMessage"></span>
    <button class="toast-close" id="errorClose" aria-label="닫기">&#x2715;</button>
  </div>

  <!-- 녹음 상태 플로팅 바 -->
  <div id="recordingStatus" class="recording-status" role="status" aria-live="polite">
    <span class="recording-dot" aria-hidden="true"></span>
    <span class="recording-text">녹음 중</span>
    <span class="recording-duration" id="recordingDuration">00:00</span>
  </div>

  <script src="/static/app.js"></script>
  <script src="/static/spa.js"></script>
</body>
</html>
