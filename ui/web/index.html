<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recap — 회의록</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- 모바일 햄버거 토글 (T-302) — 768px 이하에서만 표시.
         aria-expanded 가 drawer 상태의 단일 진실 공급원(SSOT).
         aria-controls 는 사이드바 element id (list-panel) 를 가리킨다.
         사이드바(<aside>) 자체에는 aria-expanded/aria-modal 부여 금지
         (axe aria-allowed-attr — complementary role 에서 거부됨). -->
    <button
      id="mobile-menu-toggle"
      class="mobile-menu-toggle"
      type="button"
      aria-label="메뉴 열기"
      aria-expanded="false"
      aria-controls="list-panel"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
    </button>

    <!-- drawer 백드롭 — 모바일 drawer 열림 상태에서 콘텐츠 영역을 dim 처리. -->
    <div class="drawer-backdrop" id="drawer-backdrop"></div>

    <!-- 1. 네비게이션 바 (56px, 좌측 고정) -->
    <nav id="nav-bar" aria-label="주요 내비게이션">
      <div class="nav-top">
        <!-- 회의 목록 버튼 -->
        <button class="nav-btn active" data-route="/app" id="navHome" aria-label="회의 목록">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="2" width="14" height="16" rx="2" />
            <line x1="7" y1="6" x2="13" y2="6" />
            <line x1="7" y1="10" x2="13" y2="10" />
            <line x1="7" y1="14" x2="10" y2="14" />
          </svg>
          <span class="nav-label">회의록</span>
          <kbd class="nav-kbd" aria-hidden="true">⌘1</kbd>
        </button>
        <!-- 검색 버튼 -->
        <button class="nav-btn" data-route="/app/search" id="navSearch" aria-label="검색">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8.5" cy="8.5" r="5.5" />
            <line x1="12.5" y1="12.5" x2="17" y2="17" />
          </svg>
          <span class="nav-label">검색</span>
          <kbd class="nav-kbd" aria-hidden="true">⌘K</kbd>
        </button>
        <!-- 채팅 버튼 -->
        <button class="nav-btn" data-route="/app/chat" id="navChat" aria-label="채팅">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h12a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H8l-4 3v-3a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
          </svg>
          <span class="nav-label">채팅</span>
        </button>
        <!-- 설정 버튼 -->
        <button class="nav-btn" data-route="/app/settings" id="navSettings" aria-label="설정">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="2.5" />
            <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.93 3.93l1.41 1.41M14.66 14.66l1.41 1.41M3.93 16.07l1.41-1.41M14.66 5.34l1.41-1.41" />
          </svg>
          <span class="nav-label">설정</span>
          <kbd class="nav-kbd" aria-hidden="true">⌘,</kbd>
        </button>
      </div>
      <div class="nav-bottom">
        <!-- 시스템 상태 인디케이터 -->
        <div class="nav-status" id="navStatus" role="status" aria-live="polite">
          <span class="status-dot" id="statusDot" aria-hidden="true"></span>
          <span class="nav-status-text" id="statusText"></span>
        </div>
      </div>
    </nav>

    <!-- 2. 리스트 패널 (280px, 회의 목록) -->
    <aside id="list-panel" aria-label="회의 목록 패널">
      <div class="list-header">
        <div class="brand-lockup">
          <img class="brand-mark brand-mark-light" src="/static/brand/app-icon-light.svg" width="20" height="20" alt="" aria-hidden="true">
          <img class="brand-mark brand-mark-dark" src="/static/brand/app-icon-dark.svg" width="20" height="20" alt="" aria-hidden="true">
          <h1 class="list-title">Recap</h1>
        </div>
        <div class="list-header-actions">
          <button type="button" id="importBtn" class="list-header-btn" aria-label="오디오 가져오기" title="오디오 가져오기">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 13v3a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3"></path>
              <polyline points="6,7 10,3 14,7"></polyline>
              <line x1="10" y1="3" x2="10" y2="13"></line>
            </svg>
          </button>
          <span class="list-count" id="listCount"></span>
        </div>
      </div>
      <div class="list-search">
        <input type="search" id="listSearchInput" placeholder="회의 검색..." aria-label="회의 검색">
      </div>
      <div class="list-sort">
        <select id="listSortSelect" aria-label="정렬">
          <option value="newest">최신순</option>
          <option value="oldest">오래된순</option>
          <option value="status">상태별</option>
        </select>
      </div>
      <div class="list-content" id="listContent" role="listbox" aria-label="회의 목록">
        <!-- spa.js가 회의 목록 렌더링 -->
      </div>
    </aside>

    <!-- 3. 콘텐츠 영역 (나머지 공간 flex:1) -->
    <main id="content">
      <!-- spa.js가 동적으로 렌더링 -->
    </main>
  </div>

  <!-- 테마 토글 (우측 상단 고정) -->
  <button class="theme-toggle" id="themeToggle" aria-label="다크/라이트 모드 전환">
    <svg class="theme-icon theme-icon-light" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="9" r="4"/>
      <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.93 3.93l1.41 1.41M12.66 12.66l1.41 1.41M3.93 14.07l1.41-1.41M12.66 5.34l1.41-1.41"/>
    </svg>
    <svg class="theme-icon theme-icon-dark" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15.36 10.36A7 7 0 1 1 7.64 2.64 5.5 5.5 0 0 0 15.36 10.36Z"/>
    </svg>
  </button>

  <!-- 에러 배너 (토스트) -->
  <div class="toast" id="errorBanner" role="alert" aria-live="assertive">
    <span class="toast-icon" aria-hidden="true">&#x26A0;</span>
    <span class="toast-message" id="errorMessage"></span>
    <button class="toast-close" id="errorClose" aria-label="닫기">&#x2715;</button>
  </div>

  <!-- 녹음 상태 플로팅 pill (HUD 최소화 상태) — overlay 가 최소화되었을 때 표시 -->
  <div id="recordingStatus" class="recording-status" role="status" aria-live="polite">
    <span class="recording-dot" aria-hidden="true"></span>
    <span class="recording-text">녹음 중</span>
    <div class="recording-waveform" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <span class="recording-duration" id="recordingDuration" aria-live="off">00:00</span>
    <button type="button" id="recordingExpandBtn" class="recording-expand-btn" aria-label="녹음 HUD 열기" title="녹음 패널 열기">
      <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 10h12M10 4v12"></path>
      </svg>
    </button>
    <button type="button" id="recordingStopBtn" class="recording-stop-btn" aria-label="녹음 정지">
      <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="5" y="5" width="10" height="10" rx="1"></rect>
      </svg>
    </button>
  </div>

  <!-- 녹음 Full-viewport HUD (레퍼런스 RecordingOverlay.jsx) — 녹음 시작 시 표시 -->
  <div id="recordingOverlay" class="recording-overlay" role="dialog" aria-modal="true" aria-labelledby="recordingOverlayTitle" aria-hidden="true">
    <div class="recording-scrim" data-recording-action="minimize"></div>
    <div class="recording-panel" role="document">
      <div class="recording-source">
        <span class="status-dot recording" aria-hidden="true"></span>
        <span id="recordingSourceLabel">녹음 중 · 시스템 오디오</span>
      </div>
      <div class="recording-timer" id="recordingOverlayTimer" aria-live="off">00:00:00</div>
      <div id="recordingOverlayTitle" class="sr-only">녹음 진행 중</div>
      <div class="recording-wave" aria-hidden="true">
        <!-- 48 bars — spa.js 가 마운트 시점에 생성 -->
      </div>
      <div class="recording-meta">
        <span class="num" id="recordingOverlayMetaDuration">00:00:00</span>
        <span>·</span>
        <span id="recordingOverlayMetaLevel">실시간 음성 감지</span>
      </div>
      <div class="recording-actions">
        <button type="button" class="rec-btn ghost" data-recording-action="minimize">최소화</button>
        <button type="button" class="rec-btn ghost" data-recording-action="cancel" id="recordingOverlayCancelBtn">취소</button>
        <button type="button" class="rec-btn primary" data-recording-action="stop" id="recordingOverlayStopBtn">녹음 정지 · 전사 시작</button>
      </div>
    </div>
  </div>

  <!-- 오디오 가져오기 모달 (레퍼런스 ImportPanel.jsx) — dropzone + 큐 스캐폴드 -->
  <div id="importModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="importModalTitle">
    <div class="modal-content import-modal-content">
      <h3 class="modal-title" id="importModalTitle">오디오 가져오기</h3>
      <p class="modal-message">
        파일을 끌어다 놓거나 클릭해 선택하세요.
        선택된 파일은 <code class="mono-inline">~/.meeting-transcriber/audio_input</code>
        폴더에 배치되어 파이프라인이 자동으로 시작됩니다.
      </p>
      <div class="import-dropzone" id="importDropzone" tabindex="0" role="button" aria-label="오디오 파일 드롭존">
        <svg width="28" height="28" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 13v3a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3"></path>
          <polyline points="6,7 10,3 14,7"></polyline>
          <line x1="10" y1="3" x2="10" y2="13"></line>
        </svg>
        <div class="import-dropzone-title">파일 드롭 또는 클릭해 선택</div>
        <div class="import-dropzone-sub">.m4a · .wav · .mp3 · 최대 2 GB</div>
        <input type="file" id="importFileInput" multiple accept="audio/*,.m4a,.wav,.mp3" hidden>
      </div>
      <div class="import-queue" id="importQueue" hidden>
        <div class="overline import-queue-header">선택된 파일</div>
        <div class="import-queue-list" id="importQueueList"></div>
      </div>
      <div class="import-notice" id="importNotice" hidden role="status" aria-live="polite">
        업로드 API 는 아직 준비 중입니다. 현재는 위 폴더에 직접 배치해 주세요.
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="importModalCancel">닫기</button>
        <button type="button" class="settings-save-btn" id="importModalStart" disabled>파이프라인 시작</button>
      </div>
    </div>
  </div>

  <!-- 범용 안내 모달 (정보/준비중 안내 등에 재사용, 기존 .modal-overlay 패턴 재사용) -->
  <div id="infoModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="infoModalTitle">
    <div class="modal-content">
      <h3 class="modal-title" id="infoModalTitle">안내</h3>
      <p class="modal-message" id="infoModalMessage"></p>
      <div class="modal-actions">
        <button type="button" class="settings-save-btn" id="infoModalClose">확인</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script src="/static/spa.js"></script>
</body>
</html>
